name: frameon
description: LED matrix frame editor — design, preview, and send animations to your device.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Unique IDs for layers
  uuid: ^4.3.3

  # Image / GIF decoding (wired in next phase)
  image: ^4.1.7

  # File picker for GIF/image upload
  file_picker: ^8.0.3

  # Serial communication (Windows / macOS)
  # flutter_libserialport: ^0.3.1   # uncomment when wiring device transport

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

# File picker already declared above under file_picker: ^8.0.3